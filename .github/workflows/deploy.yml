name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Only one in-flight deploy at a time. Newer pushes cancel older runs of this
# workflow before triggering Render. Render itself queues builds, but this
# avoids us telling it to deploy a now-stale commit.
concurrency:
  group: render-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${RENDER_API_KEY:-}" ]; then
            echo "::error::RENDER_API_KEY secret is not set on the repo." >&2
            exit 1
          fi
          if [ -z "${RENDER_SERVICE_ID:-}" ]; then
            echo "::error::RENDER_SERVICE_ID variable is not set on the repo." >&2
            exit 1
          fi
          # GITHUB_SHA is provided automatically by Actions and is always the
          # 40-char commit hex; safe to interpolate into JSON.
          payload=$(printf '{"commitId":"%s"}' "$GITHUB_SHA")
          response=$(curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -d "$payload")
          echo "$response"
          deploy_id=$(echo "$response" | sed -n 's/.*"id":"\(dep-[a-zA-Z0-9]*\)".*/\1/p' | head -n1)
          if [ -n "$deploy_id" ]; then
            short_sha="${GITHUB_SHA:0:10}"
            echo "::notice::Triggered Render deploy ${deploy_id} for ${short_sha}"
          fi
